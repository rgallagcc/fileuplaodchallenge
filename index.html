<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Upload Security Challenge</title>
  <link rel="stylesheet" href="style.css">

  <script src="flags.js"></script>
  <script src="challenge.js"></script>

  
</head>
<body>

<div class="container">
  <h1>🔐 File Upload Security Challenge</h1>

  <p class="intro">
    This challenge simulates a vulnerable file upload system.<br>
    Try different files to understand how attackers bypass weak validation.<br>
    Earn <strong>flags</strong> by triggering specific responses!
  </p>

  <div class="upload-box">
    <input id="fileInput" type="file">
    <button onclick="simulateUpload()">Upload File</button>
  </div>

  <div id="result" class="result"></div>

  <div class="score-box">
    <h2>🏁 Flags Collected</h2>
    <ul id="flagList"></ul>
    <p><strong>Total Score:</strong> <span id="score">0</span></p>
  </div>
</div>


</body>
</html>
